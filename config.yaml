# quant50 — global backtest configuration
# All costs are one-way in basis points unless noted.

backtest:
  start_date: "2000-01-01"
  end_date:   "2024-12-31"
  oos_fraction: 0.30          # most-recent 30% of history held out as OOS

costs:
  equity_cost_bps:      5     # one-way commissions, bps
  equity_slippage_bps:  5     # one-way market-impact / slippage, bps
  futures_cost_ticks:   1     # per-side ticks
  futures_slippage_bps: 5     # additional slippage on futures, bps

liquidity:
  min_dollar_volume:  1_000_000   # 20-day median daily $/vol; default $1M
  min_price:          5.0          # minimum close price ($)

sizing:
  default: "equal_weight"          # "equal_weight" | "vol_weight"
  vol_lookback_days: 63            # days for realized-vol estimate (vol_weight)
  vol_target: 0.10                 # annualized target vol for vol-weighted
  leverage_cap: 2.0                # max gross leverage for any strategy

universes:
  russell3000:  "Russell 3000 Current & Past"
  russell1000:  "Russell 1000 Current & Past"
  russell2000:  "Russell 2000 Current & Past"
  sp500:        "S&P 500 Current & Past"
  sp500_index:  "S&P 500"           # for constituent lookup
  russell1000_index: "Russell 1000"
  nasdaq100:    "NASDAQ 100 Current & Past"

paths:
  cache_dir:   "cache/parquet"
  results_dir: "results"
  logs_dir:    "logs"

# Per-strategy overrides: each key matches the module name prefix (e.g. "s01")
strategies:
  s01:
    lookbacks: [252, 189, 126]   # primary first (Jegadeesh-Titman canonical)
    skip_days: [21, 0]           # primary first (skip last month)
    decile: true
  s02:
    lookbacks: [63, 126, 252]
    long_short: false            # long-flat by default
    vol_target: 0.10
  s07:
    entry_days: [20, 55]
    exit_days:  [10, 20]
    atr_risk_pct: 0.005
  s08:
    top_n: 3
    lookback_months: 3
  s09:
    formation_days: [1, 5, 10]
  s10:
    bb_window: 20
    bb_sigma:  2.0
  s30:
    vol_lookback: 252
    long_short: false     # long-short formulation destroys value (OOS -0.25); LF only
  s31:
    vol_lookback: 20
    leverage_cap: 1.5
  s46:
    assets: ["SPY", "TLT", "GLD", "DBC", "VNQ"]
  s50:
    lookbacks: [21, 63, 252]     # 1/3/12-month trend ensemble
    vol_target: 0.10
